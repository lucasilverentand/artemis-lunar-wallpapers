<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff" stop-opacity="0"/>
      <stop offset="70%" stop-color="#fff" stop-opacity="0"/>
      <stop offset="100%" stop-color="#c8d0ff" stop-opacity="0.15"/>
    </radialGradient>
  </defs>
  <!-- Outer glow -->
  <circle cx="16" cy="16" r="15" fill="url(#glow)"/>
  <!-- Moon body -->
  <circle cx="16" cy="16" r="12" fill="#d4d4d8"/>
  <!-- Crescent shadow (overlapping circle creates crescent) -->
  <circle cx="21" cy="14" r="11" fill="#121214"/>
  <!-- Tiny craters on the lit side -->
  <circle cx="9" cy="14" r="1.8" fill="#b0b0b6" opacity="0.6"/>
  <circle cx="12" cy="20" r="1.2" fill="#b0b0b6" opacity="0.5"/>
  <circle cx="7" cy="19" r="0.8" fill="#b0b0b6" opacity="0.4"/>
  <!-- Bright rim highlight -->
  <path d="M10.5 5.5 A12 12 0 0 0 10.5 26.5" fill="none" stroke="#f0f0ff" stroke-width="0.5" opacity="0.4"/>
</svg>
